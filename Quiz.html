<!DOCTYPE html>
<html>
<head>
  <title>Welcome Patrick</title>
</head>
<body>

  <h1>Why Hello There</h1>
  <h2>Welcome to my Playground</h2>

  <hr>

  <h2>Quick Quiz</h2>

  <p>1. What does HTML stand for?</p>

  <input type="radio" name="q1" value="wrong"> Hyperlinks and More Links<br>
  <input type="radio" name="q1" value="correct"> HyperText Markup Language<br>
  <input type="radio" name="q1" value="wrong"> High Transfer Machine Logic

  <br><br>

  <button onclick="checkAnswers()">Submit</button>

  <p id="result"></p>

  <script>
    function checkAnswers() {
      let score = 0;

      const q1 = document.querySelector('input[name="q1"]:checked');

      if (q1 && q1.value === "correct") {
        score++;
      }

      document.getElementById("result").textContent =
        "You scored " + score + " out of 1!";
    }
  </script>

</body>
</html>
