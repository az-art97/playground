        flex-direction: column;

<body>

    <h1>Quiz Time!</h1>

    <p>Question 1: Who played the best Batman?</p>

    <button onclick="checkAnswer(3)">Christian Bale</button>
    <button onclick="checkAnswer(4)">Ben Affleck</button>
    <button onclick="checkAnswer(5)">Robert Pattinson</button>

    <p id="result"></p>

    <script>
        function checkAnswer(answer) {
            if (answer === 3) {
                document.getElementById("result").innerHTML = "Correct!";
            } 
             if (answer === 4) {
                document.getElementById("result").innerHTML = "Get fucked";
            } 
            if (answer === 5) {
                document.getElementById("result").innerHTML = "Nah try again!";
            } 
            
        }
    </script>

<a href="index.html">
