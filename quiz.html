<!DOCTYPE html>
<html>
<head>
    <title>Quiz Page</title>
</head>
<body>

    <h1>Quiz Time!</h1>

    <p>Question 1: What is my birthday?</p>

    <button onclick="checkAnswer(3)">05/08</button>
    <button onclick="checkAnswer(4)">02/09</button>
    <button onclick="checkAnswer(5)">08/08</button>

    <p id="result"></p>

    <script>
        function checkAnswer(answer) {
            if (answer === 3) {
                document.getElementById("result").innerHTML = "Correct!";
            } else {
                document.getElementById("result").innerHTML = "Try again.";
            }
        }

    
    </script>

</body>
</html>
